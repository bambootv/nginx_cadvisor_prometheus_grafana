# ============================================================================
# Telegraf Configuration - Optimized for Alloy Stack
# ============================================================================
# Telegraf chỉ thu thập:
#   ✅ inputs.nginx → nginx metrics (thay nginx_prometheus_exporter)
#   ✅ inputs.tail → parse access logs → nginxlog_* metrics
#
# ❌ BỎ inputs.cpu/mem/disk → Alloy đã thu thập (tránh trùng lặp)
# ============================================================================

[global_tags]

[agent]
    interval = "10s"
    round_interval = true
    metric_batch_size = 1000
    metric_buffer_limit = 10000
    collection_jitter = "0s"
    flush_interval = "10s"
    flush_jitter = "0s"
    precision = ""
    debug = false
    quiet = false
    logfile = "/var/log/telegraf/telegraf.log"

###############################################################################
#                                  INPUTS                                     #
###############################################################################

# Nginx stub_status metrics
[[inputs.nginx]]
    urls = ["http://nginx/nginx_status"]
    response_timeout = "5s"

# Parse nginx access logs → Extract metrics
[[inputs.tail]]
    name_override = "nginxlog"
    files = ["/var/log/nginx/access.log"]
    from_beginning = false  # Start từ cuối file (recommended)
    pipe = false
    data_format = "grok"
    grok_patterns = ["%{COMBINED_LOG_FORMAT}"]

###############################################################################
# ❌ REMOVED - Alloy đã thu thập (tránh trùng lặp):
#   [[inputs.cpu]]
#   [[inputs.disk]]
#   [[inputs.diskio]]
#   [[inputs.net]]
#   [[inputs.mem]]
#   [[inputs.system]]
###############################################################################

###############################################################################
#                                  OUTPUTS                                    #
###############################################################################

[[outputs.prometheus_client]]
    listen = ":9273"
    path = "/metrics"
    expiration_interval = "60s"
    collectors_exclude = ["gocollector", "process"]
