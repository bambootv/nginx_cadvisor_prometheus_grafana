services:
  nginx:
    image: nginx:stub_status
    container_name: nginx
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/usr/local/nginx/conf/nginx.conf:ro
      - ./nginx/nginx_sites_available:/etc/nginx/sites-available/default:ro
      - nginx_logs:/var/log/nginx
    networks:
      - monitoring_dev
    restart: always

  # ============================================================================
  # Grafana Alloy - Thay thế: node_exporter + cadvisor
  # ============================================================================
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "12345:12345"  # Alloy UI
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx_logs:/var/log/nginx:ro
    privileged: true
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    networks:
      - monitoring_dev
    restart: always
    depends_on:
      - prometheus
      - loki

  # ============================================================================
  # Telegraf - GIỮ LẠI cho nginx logs metrics (Dashboard 14900)
  # Alloy chưa support tạo metrics từ logs tốt như Telegraf
  # ============================================================================
  telegraf:
    image: telegraf:1.29.5
    container_name: telegraf
    ports:
      - "9273:9273"
    volumes:
      - ./telegraf/telegraf.optimized.conf:/etc/telegraf/telegraf.conf:ro
      - nginx_logs:/var/log/nginx:ro
    networks:
      - monitoring_dev
    restart: always
    depends_on:
      - nginx

  # ============================================================================
  # ❌ BỎ: node_exporter (Alloy thay thế)
  # ❌ BỎ: cadvisor (Alloy thay thế)
  # ❌ BỎ: nginx_prometheus_exporter (Alloy integrations.nginx thay thế)
  # ✅ GIỮ: Telegraf cho nginx logs → metrics
  # ============================================================================

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.optimized.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--enable-feature=remote-write-receiver'  # Enable remote write từ Alloy
    networks:
      - monitoring_dev
    restart: always

  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - 3456:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring_dev
    restart: always

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    user: "0:0"  # Run as root to avoid permission issues
    ports:
      - 3100:3100
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - monitoring_dev
    restart: always
    depends_on:
      - nginx

volumes:
  nginx_logs:
  grafana_data:
  prometheus_data:
  loki_data:
  alloy_data:

networks:
  monitoring_dev:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24
