x-deploy: &deploy_config
  mode: replicated
  replicas: ${COMMON_REPLICAS:-1}
  update_config:
    parallelism: 1
    order: start-first
    failure_action: rollback
    delay: 5s
  rollback_config:
    parallelism: 0
    order: stop-first
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 5s

services:
  nginx:
    image: nginx:1.28
    ports:
      - "80:80"
    volumes:
      - ./common/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./common/nginx/nginx_sites_available:/etc/nginx/conf.d/default.conf:ro
    networks:
      - monitoring_swarm_common
    deploy:
      mode: replicated
      replicas: ${NGINX_REPLICAS:-1}
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.11.1
    ports:
      - "12345:12345"
    env_file:
      - .env
    volumes:
      - ./common/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./common/alloy/geoip:/etc/alloy/geoip:ro
      - alloy_data:/var/lib/alloy
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # --- Linux Production ONLY (Uncomment when running on Linux managers/workers) ---
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    networks:
      - monitoring_swarm_common
    privileged: true
    deploy: *deploy_config

volumes:
  alloy_data:

networks:
  monitoring_swarm_common:
    driver: overlay
    ipam:
      config:
        - subnet: 10.0.11.0/24
