x-deploy: &deploy_config
  mode: replicated
  replicas: ${COMMON_REPLICAS:-1}
  update_config:
    parallelism: 1
    order: start-first
    failure_action: rollback
    delay: 5s
  rollback_config:
    parallelism: 0
    order: stop-first
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 5s

services:
  prometheus:
    image: prom/prometheus:v3.7.3
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=5d"
      - "--storage.tsdb.retention.size=10GB"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./central/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_swarm_central
    deploy:
      <<: *deploy_config
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  loki:
    image: grafana/loki:3.5
    user: "0:0"
    ports:
      - "3102:3102"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./central/loki/config.yaml:/etc/loki/config.yaml:ro
      - ./central/loki/rules_source:/loki/rules_source:ro
      - loki_rules_storage:/loki/rules_storage
      - loki_data:/loki
    networks:
      - monitoring_swarm_central
    deploy:
      <<: *deploy_config
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  grafana:
    image: grafana/grafana:11.5.2
    env_file:
      - .env
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./central/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./central/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring_swarm_central
    deploy:
      <<: *deploy_config
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  alloy:
    image: grafana/alloy:v1.14.0
    env_file:
      - .env
    environment:
      - CENTRAL_PROM_URL=http://prometheus:9090/api/v1/write
      - CENTRAL_LOKI_URL=http://loki:3102/loki/api/v1/push
    volumes:
      - ./common/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./common/alloy/geoip:/etc/alloy/geoip:ro
      - alloy_data:/var/lib/alloy
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /run/containerd:/run/containerd:ro
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    networks:
      - monitoring_swarm_central
    privileged: true
    deploy:
      <<: *deploy_config
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0
    command: tunnel --no-autoupdate run --token-file /run/secrets/cf_tunnel_token
    secrets:
      - source: cf_tunnel_token
        target: cf_tunnel_token
        mode: 0444
    networks:
      - monitoring_swarm_central
    deploy:
      <<: *deploy_config
      replicas: 1

volumes:
  prometheus_data:
  loki_data:
  loki_rules_storage:
  grafana_data:
  alloy_data:

secrets:
  cf_tunnel_token:
    external: true

networks:
  monitoring_swarm_central:
    driver: overlay
    ipam:
      config:
        - subnet: 10.0.10.0/24
