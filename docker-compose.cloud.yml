services:
  # ============================================================================
  # NGINX - Web Server
  # ============================================================================
  nginx:
    image: nginx:1.28
    ports:
      - "80:80"
    volumes:
      - ./common/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./common/nginx/nginx_sites_available:/etc/nginx/conf.d/default.conf:ro
    networks:
      - monitoring_swarm_cloud
    deploy:
      mode: replicated
      replicas: ${NGINX_REPLICAS:-1}
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================================
  # GRAFANA ALLOY - Thay thế: node_exporter + cadvisor
  # Thu thập:
  #   • System metrics (CPU, RAM, Disk, Network)
  #   • Container metrics (Docker stats)
  # ============================================================================
  alloy:
    image: grafana/alloy:v1.11.1
    ports:
      - "12345:12345" # Alloy UI
    env_file:
      - "./.env"
    environment:
      # [QUAN TRỌNG] Cho phép Makefile ghi đè URL khi chạy mode PDC
      - GRAFANA_CLOUD_PROM_URL=${GRAFANA_CLOUD_PROM_URL}
    volumes:
      # --- Configuration & Data ---
      - ./common/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ./common/alloy/geoip:/etc/alloy/geoip:ro
      - alloy_data:/var/lib/alloy

      # --- Common Mounts (Works on macOS & Linux) ---
      # Node Exporter needs these to monitor the Host (VM on macOS, Real Host on Linux)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro

      # Docker Socket & Logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

      # --- Linux Production ONLY (Uncomment on Linux) ---
      # cAdvisor needs these extra mounts to map container names & stats correctly
      # - /:/rootfs:ro # cAdvisor: Host root
      # - /sys:/sys:ro # cAdvisor: Host sysfs
      # - /var/lib/docker:/var/lib/docker:ro # cAdvisor: Full docker info (Overlaps with containers above)
      # - /dev/disk/:/dev/disk:ro # cAdvisor: Disk I/O
      # - /sys/fs/cgroup:/sys/fs/cgroup:ro # cAdvisor: Cgroups (Critical for per-container stats)
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    networks:
      - monitoring_swarm_cloud
    # cAdvisor needs privileges to access container metrics
    privileged: true
    deploy:
      mode: replicated
      replicas: ${COMMON_REPLICAS:-1}
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 5s

  # ============================================================================
  # PROMETHEUS - Self Hosted (Optional via PDC_REPLICAS)
  # ============================================================================
  prometheus:
    image: prom/prometheus:v3.8.0
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=2GB"
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./selfhost/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_swarm_cloud
    deploy:
      mode: replicated
      replicas: ${PDC_REPLICAS:-0}
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 5s

  # ============================================================================
  # GRAFANA PDC AGENT (Optional via PDC_REPLICAS)
  # ============================================================================
  pdc-agent:
    image: grafana/pdc-agent:latest
    command:
      - "-token"
      - "${GRAFANA_CLOUD_API_KEY}"
      - "-cluster"
      - "prod-ap-southeast-1"
      - "-gcloud-hosted-grafana-id"
      - "${GRAFANA_CLOUD_GRAFANA_ID}"
    networks:
      - monitoring_swarm_cloud
    deploy:
      mode: replicated
      replicas: ${PDC_REPLICAS:-0}
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 5s

volumes:
  alloy_data:
  prometheus_data:

networks:
  monitoring_swarm_cloud:
    driver: overlay
    ipam:
      config:
        - subnet: 10.0.3.0/24
