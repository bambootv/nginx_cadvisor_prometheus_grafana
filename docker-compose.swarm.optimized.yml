x-deploy: &deploy_config
  mode: replicated
  replicas: ${COMMON_REPLICAS:-1}
  update_config:
    parallelism: 1
    order: start-first
    failure_action: rollback
    delay: 5s
  rollback_config:
    parallelism: 0
    order: stop-first
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 5s

services:
  # ============================================================================
  # NGINX - Web Server
  # ============================================================================
  nginx:
    image: nginx:stub_status
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/usr/local/nginx/conf/nginx.conf:ro
      - ./nginx/nginx_sites_available:/etc/nginx/sites-available/default:ro
      - nginx_logs:/var/log/nginx
    networks:
      - monitoring_swarm
    deploy:
      mode: replicated
      replicas: ${NGINX_REPLICAS:-1}
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        delay: 5s
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 5s

  # ============================================================================
  # GRAFANA ALLOY - Thay thế: node_exporter + cadvisor
  # Thu thập:
  #   • System metrics (CPU, RAM, Disk, Network)
  #   • Container metrics (Docker stats)
  # ============================================================================
  alloy:
    image: grafana/alloy:v1.11.1
    ports:
      - "12345:12345"  # Alloy UI
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    networks:
      - monitoring_swarm
    deploy:
      mode: global  # Chạy trên mỗi node để thu thập metrics
      placement:
        constraints:
          - node.role == manager  # Hoặc bỏ constraint này để chạy trên tất cả nodes
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 5s

  # ============================================================================
  # TELEGRAF - Giữ lại TẤT CẢ metrics cho Dashboard 14900:
  #   • inputs.cpu/mem/disk/net → System metrics (cho dashboard 14900)
  #   • inputs.nginx → nginx metrics
  #   • inputs.tail → parse access logs → nginxlog_* metrics
  #
  # LƯU Ý: Có trùng với Alloy nhưng cần thiết cho dashboard 14900 hoạt động!
  # ============================================================================
  telegraf:
    image: telegraf:1.29.5
    ports:
      - "9273:9273"  # Prometheus metrics endpoint
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - nginx_logs:/var/log/nginx:ro
    networks:
      - monitoring_swarm
    deploy: *deploy_config

  # ============================================================================
  # ❌ BỎ: node_exporter (Alloy thay thế)
  # ❌ BỎ: cadvisor (Alloy thay thế)
  # ❌ BỎ: nginx_prometheus_exporter (Telegraf thay thế)
  # ============================================================================

  # ============================================================================
  # PROMETHEUS - Time-series Database
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=2GB"
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--enable-feature=remote-write-receiver'  # Enable remote write từ Alloy
    volumes:
      - ./prometheus/prometheus.optimized.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring_swarm
    deploy: *deploy_config

  # ============================================================================
  # GRAFANA - Visualization
  # ============================================================================
  grafana:
    image: grafana/grafana:10.3.3
    ports:
      - "3456:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring_swarm
    deploy: *deploy_config

volumes:
  nginx_logs:
  grafana_data:
  prometheus_data:

networks:
  monitoring_swarm:
    driver: overlay
    ipam:
      config:
        - subnet: 10.0.3.0/24
